<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Video Pipeline</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0e1116;
        color: #e5e7eb;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      .card {
        width: min(760px, 92vw);
        background: #111827;
        border: 1px solid #1f2937;
        border-radius: 14px;
        padding: 24px;
        line-height: 1.6;
      }
      h1 { margin: 0 0 10px; font-size: 22px; }
      code {
        background: #0b1220;
        border: 1px solid #1f2937;
        border-radius: 6px;
        padding: 2px 6px;
      }
      pre {
        background: #0b1220;
        border: 1px solid #1f2937;
        border-radius: 8px;
        padding: 12px;
        overflow-x: auto;
      }
      .muted { color: #9ca3af; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>UI 页面未找到</h1>
      <p>当前 Electron 已启动，但没有检测到 <code>ui/dist/index.html</code>，所以主应用页面无法加载。</p>
      <p>可选启动方式：</p>
      <pre>cd ../ui && npm install && npm run dev
# 然后设置环境变量并启动 browser-shell
AI_VIDEO_UI_URL=http://127.0.0.1:5173 npm run dev</pre>
      <p class="muted">如果你已经构建过 UI（生成 <code>ui/dist</code>），重启应用后会自动加载本地构建页面。</p>
    </div>
  </body>
  </html>
