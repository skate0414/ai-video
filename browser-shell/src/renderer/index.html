<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Bar</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Tab bar container — sits at the top of the Electron window -->
  <div id="tab-bar">
    <div id="tabs-container">
      <!-- Tabs are dynamically inserted here -->
    </div>
    <button id="new-tab-btn" title="新建标签页">+</button>
    <div id="nav-controls">
      <button id="back-btn" title="后退">←</button>
      <button id="forward-btn" title="前进">→</button>
      <button id="reload-btn" title="刷新">↻</button>
    </div>
  </div>

  <script src="tabs.js"></script>
</body>
</html>
