name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Align PR checks with `npm run ci:verify` (minus audit noise).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies (root + workspaces)
        # Root install hoists @ai-video/app-ui-shell + @ai-video/app-desktop
        # workspace deps after the direction A-2/A-3 monorepo move.
        run: npm ci

      - name: Lint dependencies (TECH_CONSTRAINTS.md compliance)
        run: npm run lint:deps:diff -- --skip-security

      - name: Package boundary (no illicit packages→src imports)
        run: npm run check:package-imports

      - name: Route error sanitization heuristic
        run: npm run check:route-sanitize

      - name: Legacy src shim guard
        run: npm run check:src-shims

      - name: Legacy src/routes recursive shim guard
        run: npm run check:src-routes-shims

      - name: Legacy src/adapters recursive shim guard
        run: npm run check:src-adapters-shims

      - name: Security audit
        run: npm audit --audit-level=high || echo "::warning::Security vulnerabilities found. Run 'npm audit fix' to resolve."

      # Workspace `tsconfig`s (shared/lib/pipeline-*/apps/server) — no repo-root `src/`.
      - name: Typecheck monorepo packages + apps/server
        run: npm run build

      - name: Strict-progress regression guard (@ts-nocheck count)
        run: npm run check:strict-progress

      - name: Typecheck frontend
        run: npm run typecheck --workspace @ai-video/app-ui-shell

      - name: Typecheck desktop shell
        run: npm run typecheck --workspace @ai-video/app-desktop

      # Run tests AND enforce per-directory coverage thresholds defined in vitest.config.ts.
      # Coverage is only uploaded from the Node 22 matrix leg to avoid duplicate uploads.
      - name: Test + coverage (Vitest — backend scripts + packages + apps)
        run: npx vitest run --coverage
        env:
          CI: true

      - name: Upload coverage report
        if: matrix.node-version == 22
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  docker-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ai-video:ci .

      - name: Start container
        run: |
          docker run -d --rm --name ai-video-ci \
            -e DATA_DIR=/tmp/ai-video-data \
            -p 3220:3220 ai-video:ci

      - name: Wait for /health
        # Retry every 2 s for up to 60 s; exit non-zero if never healthy.
        run: |
          echo "Waiting for container to become healthy…"
          healthy=false
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3220/health >/dev/null 2>&1; then
              echo "Container healthy after $((i * 2))s"
              healthy=true
              break
            fi
            # Exit early if the container has already died.
            if ! docker ps -q --filter name=ai-video-ci | grep -q .; then
              echo "::error::Container exited unexpectedly before becoming healthy"
              break
            fi
            sleep 2
          done
          if [ "$healthy" = false ]; then
            echo "::error::Container did not become healthy within 60s"
            exit 1
          fi
          curl -fsS http://localhost:3220/health | python3 -m json.tool

      - name: Show container logs
        if: always()
        run: docker logs ai-video-ci || true

      - name: Stop container
        if: always()
        run: docker stop ai-video-ci || true
