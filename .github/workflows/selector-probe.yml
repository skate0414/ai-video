name: Selector Probe (nightly)

on:
  schedule:
    # 18:00 UTC ≈ 02:00 Asia/Shanghai every day.
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run selector probe
        id: probe
        run: |
          set +e
          node scripts/probe-sites.mjs --out data/selector-probe-latest.json
          echo "exit=$?" >> "$GITHUB_OUTPUT"

      - name: Upload probe artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selector-probe
          path: data/selector-probe-*.json

      - name: Open issue on broken selectors
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'data/selector-probe-latest.json';
            if (!fs.existsSync(path)) {
              core.warning('no probe report produced');
              return;
            }
            const report = JSON.parse(fs.readFileSync(path, 'utf8'));
            const bad = (report.results || []).filter(r =>
              r.status === 'broken' || r.status === 'navigation-failed' || r.status === 'probe-error'
            );
            if (bad.length === 0) {
              core.info('all sites healthy or only degraded — no issue opened');
              return;
            }
            const title = `selector-probe: ${bad.length} site(s) broken (${new Date().toISOString().slice(0,10)})`;
            const body = [
              `Nightly Playwright probe found broken sites.`,
              ``,
              `| id | status | healthScore | broken selectors |`,
              `| -- | ------ | ----------- | ---------------- |`,
              ...bad.map(r => `| ${r.id} | ${r.status} | ${r.healthScore ?? '-'} | ${(r.broken ?? []).join(', ')} |`),
              ``,
              `Full report artifact: selector-probe (run #${context.runNumber}).`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['selector-health', 'automated'],
            });
